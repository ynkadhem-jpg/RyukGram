name: Build RyukGram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup System Dependencies
        run: |
          brew install dpkg ldid

      - name: Setup Theos Environment
        uses: beerpiss/theos-action@v1
        with:
          theos-src: "https://github.com/theos/theos"

      - name: Fetch Decrypted Instagram & Build
        run: |
          # Use compatible SDK target
          export TARGET=iphone:clang:latest:15.0

          # Download decrypted Instagram IPA
          curl -L -o instagram.ipa "https://pub-db7fbc0a417349bdaaa75968ff2572cb.r2.dev/Instagram_latest_decrypted.ipa"

          # Build tweak
          make clean package FINALPACKAGE=1

          # Extract IPA
          mkdir -p payload_dir
          unzip -q instagram.ipa -d payload_dir

          # Inject dylib
          if [ -f .theos/obj/debug/RyukGram.dylib ]; then
            cp .theos/obj/debug/RyukGram.dylib payload_dir/Payload/Instagram.app/RyukGram.dylib
          elif [ -f .theos/obj/RyukGram.dylib ]; then
            cp .theos/obj/RyukGram.dylib payload_dir/Payload/Instagram.app/RyukGram.dylib
          else
            echo "RyukGram.dylib not found!"
            exit 1
          fi

          # Sign binaries
          ldid -S payload_dir/Payload/Instagram.app/RyukGram.dylib
          ldid -S payload_dir/Payload/Instagram.app/Instagram

          # Repack IPA
          cd payload_dir
          zip -qr ../RyukGram_Clean.ipa Payload
          cd ..

      - name: Upload Clean IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RyukGram-Sideload-IPA
          path: RyukGram_Clean.ipa
