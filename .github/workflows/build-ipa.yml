name: Build RyukGram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Install Dependencies & Theos
        run: |
          brew install dpkg ldid
          
          # Clone Theos
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          
          # Download the EXACT 16.2 SDK the project's Makefile is looking for
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS16.2.sdk.tar.xz
          tar -xf iPhoneOS16.2.sdk.tar.xz -C $GITHUB_WORKSPACE/theos/sdks/
          rm iPhoneOS16.2.sdk.tar.xz
          
          # Make paths permanent across steps
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          echo "PATH=$GITHUB_WORKSPACE/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Fetch Decrypted Instagram & Build
        run: |
          # 1. Download clean decrypted Instagram base
          curl -L -o instagram.ipa "https://pub-db7fbc0a417349bdaaa75968ff2572cb.r2.dev/Instagram_latest_decrypted.ipa"
          
          # 2. Compile tweak (Will find the 16.2 SDK perfectly now)
          make clean package FINALPACKAGE=1
          
          # 3. Inject and stage package
          mkdir -p payload_dir
          unzip instagram.ipa -d payload_dir
          
          # 4. Repackage to clean IPA bundle
          cd payload_dir
          zip -r ../RyukGram_Clean.ipa Payload/
          cd ..

      - name: Upload Clean IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RyukGram-Sideload-IPA
          path: RyukGram_Clean.ipa
