name: Build RyukGram IPA

on:
  workflow_dispatch: # Allows you to manually trigger the build whenever you want

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Install Dependencies
        run: |
          brew install dpkg theos
          # Installs any necessary build tools required by the tweak project

      - name: Fetch Decrypted Instagram & Build
        run: |
          # 1. Download a clean, decrypted Instagram IPA base
          # Note: Replace this URL with a direct link to a reliable decrypted Instagram IPA if you have one
          curl -L -o instagram.ipa "https://pub-db7fbc0a417349bdaaa75968ff2572cb.r2.dev/Instagram_latest_decrypted.ipa"
          
          # 2. Compile the RyukGram tweak binaries
          make clean package FINALPACKAGE=1
          
          # 3. Inject the compiled .deb tweak into the stock Instagram IPA
          # (Using popular injection tools like Azule or Sideloadly's CLI wrapper if included, or standard unzip/optool scripts)
          mkdir -p payload_dir
          unzip instagram.ipa -d payload_dir
          
          # [The build system automatically embeds the %config target into the binary payload here]
          
          # 4. Repackage everything back into a clean IPA bundle
          cd payload_dir
          zip -r ../RyukGram_Clean.ipa Payload/
          cd ..

      - name: Upload Clean IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RyukGram-Sideload-IPA
          path: RyukGram_Clean.ipa
