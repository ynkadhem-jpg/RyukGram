name: Build RyukGram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # Uses a more modern macOS environment tracker

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install System Dependencies
        run: |
          brew install dpkg ldid

      - name: Set up Theos and iOS SDK
        uses: ImS66/setup-theos@v1.2.1
        with:
          theos-version: 'master'
          sdk-version: '16.2' # Installs the exact SDK requested by the Makefile

      - name: Fetch Decrypted Instagram & Build
        run: |
          # 1. Download clean decrypted Instagram base
          curl -L -o instagram.ipa "https://pub-db7fbc0a417349bdaaa75968ff2572cb.r2.dev/Instagram_latest_decrypted.ipa"
          
          # 2. Compile tweak (The action handles $THEOS paths automatically)
          make clean package FINALPACKAGE=1
          
          # 3. Inject and stage package
          mkdir -p payload_dir
          unzip instagram.ipa -d payload_dir
          
          # 4. Repackage to clean IPA bundle
          cd payload_dir
          zip -r ../RyukGram_Clean.ipa Payload/
          cd ..

      - name: Upload Clean IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RyukGram-Sideload-IPA
          path: RyukGram_Clean.ipa
