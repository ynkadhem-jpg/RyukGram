name: Build RyukGram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Theos Environment
        uses: theos/setup-theos@v1
        with:
          theos-version: 'master'

      - name: Fetch Decrypted Instagram & Build
        run: |
          # 1. Download clean decrypted Instagram base app
          curl -L -o instagram.ipa "https://pub-db7fbc0a417349bdaaa75968ff2572cb.r2.dev/Instagram_latest_decrypted.ipa"
          
          # 2. Compile the tweak binaries using the official environment configuration
          make clean package FINALPACKAGE=1 SYSROOT=$THEOS/sdks/iPhoneOS16.5.sdk
          
          # 3. Setup the payload injection structure
          mkdir -p payload_dir
          unzip instagram.ipa -d payload_dir
          
          # 4. Bind the tweak logic into the primary application layer
          if [ -f .theos/obj/debug/RyukGram.dylib ]; then
            cp .theos/obj/debug/RyukGram.dylib payload_dir/Payload/Instagram.app/
            ldid -S payload_dir/Payload/Instagram.app/RyukGram.dylib
          elif [ -f .theos/obj/RyukGram.dylib ]; then
            cp .theos/obj/RyukGram.dylib payload_dir/Payload/Instagram.app/
            ldid -S payload_dir/Payload/Instagram.app/RyukGram.dylib
          fi
          ldid -S payload_dir/Payload/Instagram.app/Instagram
          
          # 5. Package it all up securely
          cd payload_dir
          zip -r ../RyukGram_Clean.ipa Payload/
          cd ..

      - name: Upload Clean IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RyukGram-Sideload-IPA
          path: RyukGram_Clean.ipa
