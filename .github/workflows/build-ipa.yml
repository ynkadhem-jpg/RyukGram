name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods

      - name: Install Pods
        run: |
          pod install || true

      - name: Build app
        run: |
          xcodebuild \
          -workspace RyukGram.xcworkspace \
          -scheme RyukGram \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE="" \
          ONLY_ACTIVE_ARCH=NO \
          clean build

      - name: Create Payload
        run: |
          mkdir -p Payload
          # Explicitly targets the clean build directory we specified above
          APP=$(find build/Build/Products/Release-iphoneos/ -name "*.app" | head -n 1)
          cp -R "$APP" Payload/

      - name: Zip IPA
        run: |
          zip -r RyukGram.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RyukGram-IPA
          path: RyukGram.ipa
