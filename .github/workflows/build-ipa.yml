name: Build RyukGram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Install Dependencies & Theos
        run: |
          brew install dpkg ldid
          
          # Clone Theos safely into the workspace
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          
          # Download the 16.2 SDK headers directly via Git to completely avoid format/tar extraction crashes
          git clone https://github.com/theos/sdks.git target_sdks
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          cp -r target_sdks/iPhoneOS16.2.sdk $GITHUB_WORKSPACE/theos/sdks/
          
          # Force the environment variables to stick across all steps perfectly
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          echo "PATH=$GITHUB_WORKSPACE/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Fetch Decrypted Instagram & Build
        run: |
          # 1. Download clean decrypted Instagram base app
          curl -L -o instagram.ipa "https://pub-db7fbc0a417349bdaaa75968ff2572cb.r2.dev/Instagram_latest_decrypted.ipa"
          
          # 2. Compile the tweak binaries
          make clean package FINALPACKAGE=1
          
          # 3. Setup the payload injection structure
          mkdir -p payload_dir
          unzip instagram.ipa -d payload_dir
          
          # 4. Bind the tweak logic into the primary application layer
          if [ -f .theos/obj/debug/RyukGram.dylib ]; then
            cp .theos/obj/debug/RyukGram.dylib payload_dir/Payload/Instagram.app/
            ldid -S payload_dir/Payload/Instagram.app/RyukGram.dylib
          elif [ -f .theos/obj/RyukGram.dylib ]; then
            cp .theos/obj/RyukGram.dylib payload_dir/Payload/Instagram.app/
            ldid -S payload_dir/Payload/Instagram.app/RyukGram.dylib
          fi
          ldid -S payload_dir/Payload/Instagram.app/Instagram
          
          # 5. Package it all up securely
          cd payload_dir
          zip -r ../RyukGram_Clean.ipa Payload/
          cd ..

      - name: Upload Clean IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RyukGram-Sideload-IPA
          path: RyukGram_Clean.ipa
